name: Deploy H5 To Aliyun

on:
  push:
    branches:
      - main
    paths:
      - "share/**"
      - "icons/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/h5-deploy-aliyun.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ALIYUN_HOST: ${{ secrets.ALIYUN_HOST || '118.178.143.33' }}
      ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
      ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
      ALIYUN_TARGET_DIR: ${{ secrets.ALIYUN_TARGET_DIR || '/var/www/turtle-talents' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build H5
        run: npm run build:h5

      - name: Add target host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${ALIYUN_PORT:-22}" -H "${ALIYUN_HOST}" >> ~/.ssh/known_hosts

      - name: Sync dist to server
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ env.ALIYUN_TARGET_DIR }}/current/
          remote_host: ${{ env.ALIYUN_HOST }}
          remote_user: ${{ env.ALIYUN_USER }}
          remote_port: ${{ env.ALIYUN_PORT }}
          remote_key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Optional post-deploy command
        uses: appleboy/ssh-action@v1.2.0
        env:
          POST_DEPLOY_CMD: ${{ secrets.ALIYUN_POST_DEPLOY_CMD }}
        with:
          host: ${{ env.ALIYUN_HOST }}
          username: ${{ env.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ env.ALIYUN_PORT }}
          script: |
            if [ -n "${POST_DEPLOY_CMD}" ]; then
              eval "${POST_DEPLOY_CMD}"
            else
              echo "No ALIYUN_POST_DEPLOY_CMD set, skip."
            fi
