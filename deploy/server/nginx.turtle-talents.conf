server {
    listen 80;
    server_name _;

    root /var/www/turtle-talents/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /icons/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /build-meta.json {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
