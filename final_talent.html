        .btn:hover { background: #444; }
        .tree { background: #252540; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .talent-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .talent { width: 64px; height: 64px; background: #333; border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; cursor: pointer; }
        .talent:hover { border-color: #ffd700; }
        .talent.allocated { border-color: #4CAF50; }
        .talent.unavailable { opacity: 0.4; cursor: not-allowed; }

                ]},

    };

    const classList = [
        { id: 'warrior', name: '战士' },
        { id: 'mage', name: '法师' },
        { id: 'paladin', name: '圣骑士' },
        { id: 'hunter', name: '猎人' },
        { id: 'rogue', name: '盗贼' },
        { id: 'priest', name: '牧师' },
        { id: 'shaman', name: '萨满' },
        { id: 'warlock', name: '术士' },
        { id: 'druid', name: '德鲁伊' }
];


    let currentClass = null;
    let allocatedTalents = {};

    function init() {
        const selector = document.getElementById('classSelector');
        classList.forEach(cls => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.textContent = cls.name;
            btn.onclick = () => selectClass(cls.id);
            selector.appendChild(btn);
        });
        console.log('Init done, buttons created:', selector.children.length);
    }

    function selectClass(className) {
        console.log('Selecting class:', className);
        currentClass = className;
        allocatedTalents = {};
        
        const data = talentData[className];
        document.getElementById('calculator').style.display = 'block';
        document.getElementById('className').textContent = data.name;
        document.getElementById('className').style.color = data.color;
        
        renderTrees(data);
        updatePointsDisplay();
    }

    function renderTrees(data) {
        const container = document.getElementById('treesContainer');
        container.innerHTML = '';
        
        console.log('Rendering trees for:', data.name);
        
        data.trees.forEach((tree, treeIndex) => {
            const treeDiv = document.createElement('div');
            treeDiv.className = 'tree';
            treeDiv.innerHTML = '<h3 style="color:' + data.color + '">' + tree.name + ' (' + tree.maxPoints + '点)</h3>';
            
            const grid = document.createElement('div');
            grid.className = 'talent-grid';
            
            tree.talents.forEach((talent, talentIndex) => {
                const key = treeIndex + '_' + talentIndex;
                const rank = allocatedTalents[key] || 0;
                const isAvailable = canAllocate(treeIndex, talentIndex, tree);
                
                const talentDiv = document.createElement('div');
                talentDiv.className = 'talent' + (rank > 0 ? ' allocated' : '') + (!isAvailable ? ' unavailable' : '');
                talentDiv.textContent = talent.name.substring(0, 12);
                talentDiv.title = talent.name + ' (' + rank + '/' + talent.maxRanks + ')';
                talentDiv.onclick = () => allocatePoint(treeIndex, talentIndex);
                
                grid.appendChild(talentDiv);
            });
            
            treeDiv.appendChild(grid);
            container.appendChild(treeDiv);
        });
        
        console.log('Render complete');
    }

    function canAllocate(treeIndex, talentIndex, tree) {
        const talent = tree.talents[talentIndex];
        if (talent.row === 0) return true;
        
        for (let i = 0; i < tree.talents.length; i++) {
            if (tree.talents[i].row === talent.row - 1) {
                const key = treeIndex + '_' + i;
                if ((allocatedTalents[key] || 0) >= 1) return true;
            }
        }
        return false;
    }

    function allocatePoint(treeIndex, talentIndex) {
        const data = talentData[currentClass];
        const tree = data.trees[treeIndex];
        const talent = tree.talents[talentIndex];
        const key = treeIndex + '_' + talentIndex;
        const currentRank = allocatedTalents[key] || 0;
        
        if (currentRank >= talent.maxRanks) return;
        if (getTotalPointsSpent() >= 51) return;
        if (!canAllocate(treeIndex, talentIndex, tree)) return;
        
        allocatedTalents[key] = currentRank + 1;
        renderTrees(data);
        updatePointsDisplay();
    }

    function getTotalPointsSpent() {
        return Object.values(allocatedTalents).reduce((a, b) => a + b, 0);
    }

    function updatePointsDisplay() {
        document.getElementById('pointsLeft').textContent = 51 - getTotalPointsSpent();
    }

    // Initialize
    init();
    </script>
